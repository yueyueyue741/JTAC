<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F9F5EF">
  <title>快穿养成游戏</title>
  <!-- Design Token 必须最先加载 -->
  <link rel="stylesheet" href="styles/theme.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/animations.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <div class="app-shell" data-bg-mode="color">
    <!-- Section 7.2 主空间 -->
    <main class="app-main">
      <!-- 7.2.2 顶部区域 -->
      <header class="main-header">
        <span class="main-header__world" title="点击跳转世界档案">当前世界</span>
        <button type="button" class="btn btn--ghost main-header__manage">管理</button>
      </header>

      <!-- 7.2.3 悬浮入口卡片容器（正方形，可拖动占位） -->
      <section class="floating-cards-area" aria-label="主空间入口">
        <article class="floating-card" data-id="world-transition" style="top: 12%; left: 8%;">
          <svg class="floating-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
          </svg>
          <span class="floating-card__label">世界跃迁</span>
        </article>
        <article class="floating-card" data-id="world-archive" style="top: 12%; left: 36%;">
          <svg class="floating-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/>
          </svg>
          <span class="floating-card__label">世界档案</span>
        </article>
        <article class="floating-card" data-id="lebotalk" style="top: 12%; right: 8%; left: auto;">
          <svg class="floating-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
          </svg>
          <span class="floating-card__label">乐博通</span>
        </article>
        <article class="floating-card" data-id="mishu" style="top: 36%; left: 22%;">
          <svg class="floating-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
          <span class="floating-card__label">密书</span>
        </article>
        <article class="floating-card" data-id="shop" style="top: 36%; right: 22%; left: auto;">
          <svg class="floating-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          <span class="floating-card__label">购购购</span>
        </article>
      </section>

      <!-- 7.2.4 中央主神空间入口 -->
      <section class="central-area">
        <button type="button" class="main-god-btn" aria-label="进入当前世界">
          <svg class="main-god-btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/>
          </svg>
        </button>
      </section>
    </main>

    <!-- 7.2.5 底部导航栏（3 Tab） -->
    <nav class="bottom-nav" aria-label="主空间导航">
      <button type="button" class="bottom-nav__item" data-tab="api">
        <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="14"/><line x1="20" y1="10" x2="20" y2="3"/>
        </svg>
        <span class="bottom-nav__label">API 设置</span>
      </button>
      <button type="button" class="bottom-nav__item" data-tab="system">
        <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9.19 18a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 6 6.81a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span class="bottom-nav__label">系统设置</span>
      </button>
      <button type="button" class="bottom-nav__item" data-tab="theme">
        <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="13.5" cy="6.5" r="1.5"/><circle cx="17.5" cy="10.5" r="1.5"/><circle cx="8.5" cy="7.5" r="1.5"/><circle cx="6.5" cy="12.5" r="1.5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.9 0 1.75-.1 2.5-.3"/>
        </svg>
        <span class="bottom-nav__label">美化设置</span>
      </button>
    </nav>
  </div>
</body>
</html>
